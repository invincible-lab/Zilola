workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - sdk_paths
      vars:
        PACKAGE_NAME: "com.jamoliddin_2004.Zilola"
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Generate JS Bundle
        script: |
          npx expo export:embed --platform android --dev false --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/
      - name: Build Android APK (Release)
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - nuriddinametov1@gmail.com
